---
layout: default
---
<div class="row">
  {% for item in site.data.watchlist %}
    <div class="column">
      <div class="content">
        <img src="{{ item.image }}" alt="{{ item.alt }}" style="width:100%">
        <h3>{{ item.title }}</h3>
        <p>{{ item.description }}</p>
      </div>
    </div>
  {% endfor %}
</div>
