---
layout: default
---

{% include lang.html %}
<head>
  <link rel="stylesheet" href="{{ 'assets/css/outside.css' | relative_url }}">
</head>
<div class="custom-page">
    <div class="outside-main">
    <div class="outside-row">
    {% for item in site.data.watchlist %}
        <div class="outside-column">
        <div class="content">
            <img src="{{ item.image }}" alt="{{ item.alt }}" style="width:100%">
            <h3>{{ item.title }}</h3>
            <p>{{ item.description }}</p>
        </div>
        </div>
    {% endfor %}
    </div>
    </div>
</div>
